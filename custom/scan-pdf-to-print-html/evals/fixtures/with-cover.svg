<?xml version="1.0" encoding="UTF-8"?>
<!-- Minimal A4 portrait SVG fixture for the svg-cover-injection eval.
     Named concept-map.svg in the temp job dir so inject_cover_metadata()
     picks it up (it keys on exactly that filename).
     210mm x 297mm viewBox per a4-novak-svg-cover output contract. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 297" width="210mm" height="297mm">
  <rect width="210" height="297" fill="#f0f4f8"/>
  <rect x="10" y="10" width="190" height="277" fill="none" stroke="#3b5f8a" stroke-width="1"/>
  <text x="105" y="140" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3b5f8a" font-weight="bold">TEST COVER</text>
  <text x="105" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7a8f">scan-pdf-to-print-html eval fixture</text>
  <circle cx="105" cy="210" r="30" fill="none" stroke="#3b5f8a" stroke-width="0.8"/>
  <line x1="75" y1="210" x2="135" y2="210" stroke="#3b5f8a" stroke-width="0.5"/>
  <line x1="105" y1="180" x2="105" y2="240" stroke="#3b5f8a" stroke-width="0.5"/>
</svg>
