# my-skills external source configuration
# This is the single source of truth for all mirrored external sources.
# Both update.sh and update.ps1 should read from here (or a Python core should).

skill_sources:
  - name: anthropics-skills
    repo: https://github.com/anthropics/skills.git
    branch: main
    subdir: skills
    mode: flatten
    tier: core
    include_in_main_catalog: true

  - name: awesome-claude-skills
    repo: https://github.com/ComposioHQ/awesome-claude-skills.git
    branch: master
    subdir: .
    mode: flatten
    tier: bulk
    include_in_main_catalog: false
    # 863 skills, mostly "Automate X tasks via Rube MCP" — high volume, low signal

  - name: claude-plugins-official
